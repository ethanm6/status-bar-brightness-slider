[versions]
agp = "9.1.0"
# XposedBridge API — 82 is the stable release targeting Android 14/15/16
xposed-api = "82"

[libraries]
# XposedBridge API (compileOnly — provided by LSPosed at runtime)
xposed-api = { group = "de.robv.android.xposed", name = "api", version.ref = "xposed-api" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
